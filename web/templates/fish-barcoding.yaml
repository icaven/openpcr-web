pcr_program_name: Fish barcoding
pcr_program_description: (VF2_tl/FishF2_tl/FishR2_tl/FR1d_tl)
cycles:
- loops: 1
  steps:
  - name: Initial
    temperature: 94
    duration: 60
- loops: 35
  steps:
  - name: Denature
    temperature: 94
    duration: 15
  - name: Anneal
    temperature: 54
    duration: 15
  - name: Extend
    temperature: 72
    duration: 30
- loops: 1
  steps:
  - name: Hold
    temperature: 20     # Don't lower this since device damage may occur
    duration: 0
